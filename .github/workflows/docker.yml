name: Build and Publish Docker Image

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: mendez_flask_postgres
  IMAGE_TAG: 1.0.0  # FASE 1: Inicializar con 1.0.0 (Cambiar a 2.0.0 después)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar Codigo
        uses: actions/checkout@v4

      - name: Convertir nombres a minusculas
        id: string
        run: |
          echo "REPO_LOWERCASE=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir Imagen
        run: |
          docker build \
          -t ghcr.io/${{ steps.string.outputs.REPO_LOWERCASE }}:${{ env.IMAGE_TAG }} \
          -t ghcr.io/${{ steps.string.outputs.REPO_LOWERCASE }}:latest \
          .

      - name: Publicar Imagen
        run: |
          docker push ghcr.io/${{ steps.string.outputs.REPO_LOWERCASE }}:${{ env.IMAGE_TAG }}
          docker push ghcr.io/${{ steps.string.outputs.REPO_LOWERCASE }}:latest